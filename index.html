<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OLIV YVES</title>
<meta name="description" content="OLIV YVES — peças de autor, em coleções. AURON: arte em acrílico translúcido.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..48,400;0,9..48,500;0,9..48,600;0,9..48,700;1,9..48,400&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;0,6..96,600;0,6..96,700;1,6..96,400&family=Poppins:wght@700;800;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="portal-page">

<div class="grain"></div>

<header class="topbar solid">
  <a href="index.html" class="wordmark">OLIV YVES</a>
  <nav>
    <a href="index.html#colecoes" class="nav-main" data-i18n="nav.collections">Coleções</a>
    <a href="loja.html" class="nav-main" data-i18n="nav.shop">Loja</a>
    <button class="currency" data-currency-toggle aria-label="Moeda / Currency">
      <span data-cur="EUR">EUR</span><span class="sep">/</span><span data-cur="USD">USD</span>
    </button>
    <button class="lang" data-lang-toggle aria-label="Idioma / Language">
      <span data-lang="pt">PT</span><span class="sep">/</span><span data-lang="en">EN</span>
    </button>
    <button class="cart-btn" data-cart-open aria-label="Carrinho / Cart">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 6h2l2.2 11.2a2 2 0 0 0 2 1.6h7.6a2 2 0 0 0 2-1.6L21 9H6"/><circle cx="10" cy="21" r="1.4" fill="currentColor" stroke="none"/><circle cx="17" cy="21" r="1.4" fill="currentColor" stroke="none"/></svg>
      <span class="cart-badge" data-cart-count hidden>0</span>
    </button>
  </nav>
</header>

<!-- CARRINHO -->
<div id="cart-drawer" class="cart-drawer" hidden>
  <div class="cart-backdrop" data-close></div>
  <div class="cart-panel" role="dialog" aria-modal="true">
    <div class="cart-head">
      <h2 data-i18n="cart.title">Carrinho</h2>
      <button class="modal-x" data-close aria-label="Fechar / Close">×</button>
    </div>
    <div class="cart-list" id="cart-list"></div>
    <div class="cart-foot">
      <div class="cart-totals">
        <div class="cart-total-row">
          <span data-i18n="cart.subtotal">Subtotal</span>
          <span id="cart-subtotal">—</span>
        </div>
      </div>
      <button class="cta cta-order" id="cart-checkout" data-i18n="cart.checkout" disabled>Finalizar encomenda</button>
    </div>
  </div>
</div>

<!-- PORTAL HERO -->
<section class="portal-hero">
  <div class="portal-vignette"></div>
  <div class="portal-hero-inner">
    <h1 class="portal-mark">OLIV YVES</h1>
  </div>
  <a class="scroll-down" href="#colecoes" aria-label="Coleções"><span></span></a>
</section>

<!-- COLEÇÕES (renderizadas a partir de data.js) -->
<section id="colecoes" class="portal-collections">
  <p class="eyebrow center" data-i18n="portal.collections">Coleções</p>
  <div id="collections-root" class="collections-grid"></div>
</section>

<footer class="site-footer">
  <div class="foot-top">
    <a href="index.html" class="wordmark">OLIV YVES</a>
    <nav class="foot-links">
      <a href="loja.html" data-i18n="nav.shop">Loja</a>
      <a href="auron.html" data-i18n="nav.auron">AURON</a>
      <a href="legal.html" data-i18n="footer.terms">Termos</a>
      <a href="legal.html" data-i18n="footer.privacy">Privacidade</a>
      <a href="mailto:ivodeoliveiradrive@gmail.com" data-i18n="footer.contact">Contacto</a>
    </nav>
  </div>
  <div class="foot-bottom">
    <p data-i18n="footer.rights">© 2026 OLIV YVES. Todos os direitos reservados.</p>
  </div>
</footer>

<script src="data.js"></script>
<script src="i18n.js"></script>
<script src="cart.js"></script>
<script src="checkout.js"></script>
<script src="portal.js"></script>
<script src="portal-cursor.js"></script>
<script src="chat.js"></script>
</body>
</html>
